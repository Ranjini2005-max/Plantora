<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Plantora</title>

    <link rel="stylesheet" href="css/style.css">

</head>


<body>


    <!-- Navigation -->

    <nav class="navbar">

        <h2 class="logo">
            🌿 Plantora
        </h2>


        <button 
            type="button"
            id="navBtn"
            class="login-btn">

            Login

        </button>


    </nav>




    <!-- Main App Container -->

    <main class="app-layout">


        <aside id="sidebar">

        </aside>



        <section id="app">

        </section>



    </main>





    <!-- Authentication Modal -->

    <div class="modal" id="authModal">


        <div class="modal-content">


            <span 
                class="close-btn" 
                id="closeModal">

                &times;

            </span>





            <!-- Login Form -->

            <div id="loginForm">


                <h2>
                    Welcome Back 🌿
                </h2>



                <input
                    type="email"
                    id="loginEmail"
                    placeholder="Email"
                >



                <input
                    type="password"
                    id="loginPassword"
                    placeholder="Password"
                >



                <button
                    type="button"
                    id="loginBtn">

                    Login

                </button>



                <p>

                    Don't have an account?

                    <a href="#" id="showSignup">
                        Sign Up
                    </a>

                </p>


            </div>







            <!-- Signup Form -->

            <div id="signupForm" style="display:none;">


                <h2>
                    Create Account 🌱
                </h2>



                <input
                    type="text"
                    id="signupName"
                    placeholder="Full Name"
                >



                <input
                    type="email"
                    id="signupEmail"
                    placeholder="Email"
                >



                <input
                    type="password"
                    id="signupPassword"
                    placeholder="Password"
                >



                <button
                    type="button"
                    id="signupBtn">

                    Create Account

                </button>




                <p>

                    Already have an account?

                    <a href="#" id="showLogin">
                        Login
                    </a>

                </p>


            </div>



        </div>


    </div>





    <script 
        type="module"
        src="js/script.js">

    </script>



</body>

</html>
